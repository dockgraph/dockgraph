version: 2

updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]

  - package-ecosystem: gomod
    directory: /backend
    schedule:
      interval: weekly
    groups:
      go-dependencies:
        patterns: ["*"]

  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
    groups:
      npm-dependencies:
        patterns: ["*"]
        exclude-patterns: ["eslint*", "typescript*"]
      npm-dev:
        dependency-type: development
        patterns: ["eslint*", "typescript*"]
