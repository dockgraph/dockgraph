name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "LICENSE"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "LICENSE"

permissions:
  contents: read

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          working-directory: backend

      - name: Check go mod tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum
        working-directory: backend

      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@latest

      - name: Test
        run: gotestsum --junitfile=junit.xml -- -race -coverprofile=coverage.out ./...
        working-directory: backend

      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@v6
        with:
          files: backend/coverage.out
          flags: backend
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload test results
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v6
        with:
          files: backend/junit.xml
          flags: backend
          token: ${{ secrets.CODECOV_TOKEN }}
          report-type: test_results

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        # TODO: remove --legacy-peer-deps once typescript-eslint supports TypeScript 6
        run: npm ci --legacy-peer-deps
        working-directory: frontend

      - name: Lint
        run: npm run lint
        working-directory: frontend

      - name: Test
        run: npx vitest run --coverage --coverage.reporter=lcov --coverage.reporter=text --reporter=default --reporter=junit --outputFile.junit=junit.xml
        working-directory: frontend

      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@v6
        with:
          files: frontend/coverage/lcov.info
          flags: frontend
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload test results
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v6
        with:
          files: frontend/junit.xml
          flags: frontend
          token: ${{ secrets.CODECOV_TOKEN }}
          report-type: test_results

      - name: Build
        run: npm run build
        working-directory: frontend
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  smoke:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Run smoke test
        run: bash test/smoke_test.sh
