name: Bug Report
description: Something isn't working as expected? Report it here.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report this bug!

        **Tip:** Search [existing issues](https://github.com/dockgraph/dockgraph/issues?q=is%3Aissue) first — your problem may already be tracked.

        **Security issue?** Please report it privately via [Security Advisories](https://github.com/dockgraph/dockgraph/security/advisories/new) instead.

  - type: checkboxes
    id: duplicate-check
    attributes:
      label: Duplicate check
      options:
        - label: I searched existing issues and didn't find a match
          required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug. Screenshots and screen recordings help a lot.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: worked-before
    attributes:
      label: Did this work before?
      description: If yes, which version last worked correctly?
    validations:
      required: false

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run DockGraph with...
        2. Open the UI and...
        3. Click on...
        4. See error
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: DockGraph version
      description: "Run `docker inspect dockgraph | grep Image` or check the release you downloaded. Don't write \"latest\"."
      placeholder: "e.g., v0.1.0"
    validations:
      required: true

  - type: input
    id: docker-version
    attributes:
      label: Docker version
      description: "Output of `docker version --format '{{.Server.Version}}'`"
      placeholder: "e.g., 27.5.1"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system and architecture
      placeholder: "e.g., Ubuntu 24.04 x86_64"
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser
      placeholder: "e.g., Chrome 134, Firefox 136"
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: "Paste container logs: `docker logs dockgraph`"
      render: shell
    validations:
      required: false
