name: dockgraph

services:
  dockgraph:
    build: .
    container_name: dockgraph
    ports:
      # Host Port : Container Port
      - "7800:7800"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro  # Docker API access
      - ./demo:/app/demo:ro                        # Demo stacks (optional)
    environment:
      DG_PORT: "7800"         # HTTP listen port (must match container port)
      DG_POLL_INTERVAL: "30s" # Docker API polling interval
    labels:
      dockgraph.self: "true" # hides this container from the graph
