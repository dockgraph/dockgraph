name: dockgraph

services:
  dockgraph:
    build: .
    ports:
      - "7800:7800"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./docker-compose.yml:/app/compose/docker-compose.yml:ro
    labels:
      dev.dockgraph.self: "true"
    healthcheck:
      test: ["CMD", "/dockgraph", "--healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
