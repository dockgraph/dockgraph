name: dockgraph

services:
  dockgraph:
    build: .
    ports:
      - "7800:7800"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./docker-compose.yml:/app/compose/docker-compose.yml:ro
    labels:
      dev.dockgraph.self: "true"
    healthcheck:
      test: ["/dockgraph", "--healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
