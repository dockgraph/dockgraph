<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f1a2e"/>
      <stop offset="100%" stop-color="#0a1220"/>
    </linearGradient>
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.08)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.02)"/>
    </linearGradient>
    <linearGradient id="glassBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.15)"/>
      <stop offset="50%" stop-color="rgba(255,255,255,0.06)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.1)"/>
    </linearGradient>
    <linearGradient id="blueNode" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a9ede"/>
      <stop offset="100%" stop-color="#2d6fa0"/>
    </linearGradient>
    <linearGradient id="grayNode" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#506178"/>
      <stop offset="100%" stop-color="#3f5068"/>
    </linearGradient>
    <linearGradient id="greenNode" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22a86a"/>
      <stop offset="100%" stop-color="#178a52"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="starGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="0.8"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect x="0" y="0" width="128" height="128" rx="28" fill="url(#bgGrad)"/>

  <!-- Background dots -->
  <circle cx="22" cy="78" r="0.6" fill="#ffffff" opacity="0.25" filter="url(#starGlow)"/>
  <circle cx="98" cy="32" r="0.5" fill="#ffffff" opacity="0.2" filter="url(#starGlow)"/>
  <circle cx="108" cy="88" r="0.4" fill="#ffffff" opacity="0.15" filter="url(#starGlow)"/>
  <circle cx="30" cy="100" r="0.5" fill="#ffffff" opacity="0.2" filter="url(#starGlow)"/>
  <circle cx="85" cy="105" r="0.4" fill="#ffffff" opacity="0.15" filter="url(#starGlow)"/>
  <circle cx="15" cy="42" r="0.4" fill="#ffffff" opacity="0.12" filter="url(#starGlow)"/>
  <circle cx="45" cy="22" r="0.5" fill="#94a3b8" opacity="0.15"/>
  <circle cx="110" cy="52" r="0.6" fill="#94a3b8" opacity="0.12"/>
  <circle cx="18" cy="95" r="0.4" fill="#94a3b8" opacity="0.18"/>
  <circle cx="72" cy="112" r="0.5" fill="#94a3b8" opacity="0.14"/>
  <circle cx="102" cy="70" r="0.4" fill="#94a3b8" opacity="0.1"/>
  <circle cx="38" cy="36" r="0.3" fill="#94a3b8" opacity="0.16"/>
  <circle cx="112" cy="28" r="0.4" fill="#94a3b8" opacity="0.12"/>
  <circle cx="55" cy="108" r="0.5" fill="#94a3b8" opacity="0.13"/>
  <circle cx="20" cy="58" r="0.3" fill="#94a3b8" opacity="0.15"/>
  <circle cx="95" cy="95" r="0.4" fill="#94a3b8" opacity="0.11"/>
  <circle cx="65" cy="18" r="0.3" fill="#94a3b8" opacity="0.14"/>
  <circle cx="105" cy="42" r="0.5" fill="#94a3b8" opacity="0.1"/>
  <circle cx="28" cy="112" r="0.4" fill="#94a3b8" opacity="0.16"/>
  <circle cx="82" cy="22" r="0.3" fill="#94a3b8" opacity="0.12"/>
  <circle cx="42" cy="88" r="0.4" fill="#94a3b8" opacity="0.13"/>
  <circle cx="115" cy="62" r="0.3" fill="#94a3b8" opacity="0.11"/>
  <circle cx="52" cy="48" r="0.3" fill="#94a3b8" opacity="0.14"/>
  <circle cx="90" cy="78" r="0.4" fill="#94a3b8" opacity="0.1"/>
  <circle cx="14" cy="68" r="0.3" fill="#94a3b8" opacity="0.15"/>
  <circle cx="78" cy="98" r="0.3" fill="#94a3b8" opacity="0.12"/>

  <!-- Glass panel -->
  <rect x="12" y="12" width="104" height="104" rx="22" fill="url(#glassGrad)" stroke="url(#glassBorder)" stroke-width="0.8"/>

  <!-- Nodes (rendered first = behind lines) -->

  <!-- Blue node (top center-right) -->
  <rect x="56" y="28" width="42" height="20" rx="5" fill="url(#blueNode)" opacity="0.9"/>
  <rect x="56" y="28" width="42" height="10" rx="5" fill="rgba(255,255,255,0.1)"/>

  <!-- Gray node (left middle) -->
  <rect x="18" y="52" width="42" height="20" rx="5" fill="url(#grayNode)" opacity="0.9"/>

  <!-- Green node (bottom center-right) — aligned with blue node center x=77 -->
  <rect x="58" y="82" width="38" height="20" rx="5" fill="url(#greenNode)" opacity="0.9"/>
  <rect x="58" y="82" width="38" height="10" rx="5" fill="rgba(255,255,255,0.08)"/>

  <!-- Lines and dots (rendered last = on top of nodes) -->

  <!-- Blue lines — from exact center of node sides -->
  <line x1="77" y1="48" x2="77" y2="62" stroke="#3b82f6" stroke-width="1.5"/>
  <line x1="77" y1="62" x2="60" y2="62" stroke="#3b82f6" stroke-width="1.5"/>
  <line x1="77" y1="62" x2="77" y2="82" stroke="#3b82f6" stroke-width="1.5"/>

  <!-- Orange line: gray bottom center (39,72) → green left center (58,92), rounded corner -->
  <path d="M39,72 L39,88 Q39,92 43,92 L58,92" fill="none" stroke="#d4891a" stroke-width="1.5"/>

  <!-- Blue junction dots -->
  <circle cx="77" cy="62" r="2.5" fill="#3b82f6" filter="url(#glow)"/>
  <circle cx="77" cy="48" r="2" fill="#3b82f6"/>
  <circle cx="77" cy="82" r="2" fill="#3b82f6"/>
  <circle cx="60" cy="62" r="2" fill="#3b82f6"/>

  <!-- Orange dots at ends -->
  <circle cx="39" cy="72" r="2" fill="#d4891a"/>
  <circle cx="58" cy="92" r="2" fill="#d4891a"/>

  <!-- Green status dot on gray node (left side) -->
  <circle cx="26" cy="62" r="3" fill="#22c55e" filter="url(#glow)"/>
</svg>
